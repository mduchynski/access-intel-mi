function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* Try to geocode from address zip code */
function geocodeFromAddress(loc) {
  if (loc.lat && loc.lng) return loc;
  const addr = loc.address || "";
  const zipMatch = addr.match(/(\d{5})/);
  if (zipMatch && ZIP_COORDS[zipMatch[1]]) {
    const [lat, lng] = ZIP_COORDS[zipMatch[1]];
    return { ...loc, lat, lng };
  }
  return loc;
}

/* Classify location as UC or PCP */
function getLocType(loc) {
  const t = (loc.type || "").toLowerCase();
  const n = (loc.name || "").toLowerCase();
  const s = (loc.system || "").toLowerCase();
  if (t.includes("urgent") || n.includes("urgent care") || s === "corewell_uc" || s === "firstchoice_uc" || s === "doctors_care" || s === "gohealth_uc") return "UC";
  if (t.includes("primary") || n.includes("primary") || n.includes("family medicine") || n.includes("internal medicine") || s === "corewell_pc" || s === "henryford_pc" || s === "trinity_pc") return "PCP";
  return "Other";
}

function nextAvailColor(na) {
  if (!na) return "#757575";
  if (na.includes("closed")) return "#D32F2F";
  if (na.includes("slots") || na.includes("appts") || na.includes("in line") || na.includes("slot") || na.includes("open") || na.includes("Walk")) return "#2E7D32";
  return "#757575";
}

function getTypeColor(type) {
  if (type === "UC") return { bg: "#E3F2FD", text: "#1565C0", border: "#90CAF9" };
  if (type === "PCP") return { bg: "#F3E5F5", text: "#7B1FA2", border: "#CE93D8" };
  return { bg: "#F5F5F5", text: "#616161", border: "#E0E0E0" };
}

function TypeBadge({ type }) {
  const c = getTypeColor(type);
  return <span style={{ display:"inline-block", padding:"1px 7px", borderRadius:10, fontSize:9, fontWeight:700, background:c.bg, color:c.text, border:`1px solid ${c.border}`, fontFamily:"'JetBrains Mono',monospace" }}>{type}</span>;
}

function SlotBadge({ count }) {
  if (count === 0) return <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"2px 8px", borderRadius:16, fontSize:10, fontWeight:600, background:"#FAFAFA", color:"#9E9E9E", border:"1px solid #E0E0E0", fontFamily:"'JetBrains Mono',monospace" }}><span style={{ width:5, height:5, borderRadius:"50%", background:"#BDBDBD" }} />NONE</span>;
  const low = count <= 2;
  return <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"2px 8px", borderRadius:16, fontSize:10, fontWeight:700, background:low?"#FFF3E0":"#E8F5E9", color:low?"#E65100":"#2E7D32", border:`1px solid ${low?"#FFB74D":"#81C784"}`, fontFamily:"'JetBrains Mono',monospace" }}><span style={{ width:5, height:5, borderRadius:"50%", background:low?"#FF9800":"#4CAF50", animation:"pulse 2s infinite" }} />{count}</span>;
}

function NextDayBadge({ count, dateStr }) {
  if (!count || count === 0) return <span style={{ fontSize:10, color:"#BDBDBD", fontFamily:"'JetBrains Mono',monospace" }}>—</span>;
  return (

    </span>
  );
}

  const [lastFetch, setLastFetch] = useState(null);
  const [activeTab, setActiveTab] = useState("All");
  const [radius, setRadius] = useState(10);
  const [trendsData, setTrendsData] = useState(null);
  const [trendView, setTrendView] = useState("perCenter"); // perCenter | bySystem | market
  const [waitAlerts, setWaitAlerts] = useState(null);

  useEffect(() => {
    async function loadData() {
      setLoading(true);
      setError(null);
      try {
        let avail = null;
        // GitHub Pages mode — load directly from static JSON file
        const jsonResp = await fetch(JSON_FILE + "?t=" + Date.now());
        const raw = await jsonResp.json();
        const allLocs = [];
        for (const [sysId, sysData] of Object.entries(raw.systems || {})) {
          for (const loc of (sysData.locations || [])) {
            loc.system = sysId;
            loc.systemName = sysData.name || sysId;
            allLocs.push(loc);
          }
        }
        avail = { lastUpdated: raw.lastUpdated, totalLocations: allLocs.length, totalSlots: allLocs.reduce((s,l) => s + (l.sameDaySlots||0), 0), locations: allLocs };
        setApiHealth({ status: "static" });
        if (avail && avail.locations) {
          avail.locations = avail.locations.map(geocodeFromAddress);
        }
        setLiveData(avail);
        setLastFetch(new Date());
        // Load trends data (optional — works without it)
        try {
          const trendsResp = await fetch("./trends.json?t=" + Date.now());
          if (trendsResp.ok) {
            const trends = await trendsResp.json();
            setTrendsData(trends);
          }
        } catch (trendErr) {
          try {
            const trendsResp2 = await fetch("./data/trends.json?t=" + Date.now());
            if (trendsResp2.ok) {
              const trends = await trendsResp2.json();
              setTrendsData(trends);
            }
          } catch (_) { /* no trends available yet */ }
        }
        // Load wait alerts (optional)
        try {
          const alertsResp = await fetch("./wait_alerts.json?t=" + Date.now());
          if (alertsResp.ok) {
            const alerts = await alertsResp.json();
            setWaitAlerts(alerts);
          }
        } catch (aerr) {
          try {
            const alertsResp2 = await fetch("./data/wait_alerts.json?t=" + Date.now());
            if (alertsResp2.ok) {
              const alerts = await alertsResp2.json();
              setWaitAlerts(alerts);
            }
          } catch (_) { /* no alerts yet */ }
        }
      } catch (err) {
        setError(`Could not load data. Check that current.json exists.`);
      }
      setLoading(false);
    }
    loadData();
    const interval = setInterval(loadData, 5 * 60 * 1000);
    return () => clearInterval(interval);
  }, []);

  const allLocations = useMemo(() => {
    if (!liveData || !liveData.locations) return [];
    return liveData.locations.map(l => {
      // Clean up &nbsp; entities from any string fields
      const clean = (s) => typeof s === "string" ? s.replace(/&nbsp;/g, " ").replace(/\u00a0/g, " ") : s;
      return { ...l, nextAvailable: clean(l.nextAvailable), name: clean(l.name), address: clean(l.address), locType: getLocType(l) };
    });
  }, [liveData]);

  const tabFiltered = useMemo(() => {
    if (activeTab === "All") return allLocations;
    return allLocations.filter(l => l.locType === activeTab);
  }, [allLocations, activeTab]);

  const locKey = (l) => (l.id || "") + "|" + (l.name || "");

  const selectedLocation = useMemo(() => {
    if (!selectedUC) return null;
    return allLocations.find(l => locKey(l) === selectedUC);
  }, [allLocations, selectedUC]);

  // Radius computation — uses ALL locations regardless of tab, then tab-filters after
  const nearbyAll = useMemo(() => {
    if (!selectedLocation) return [];
    const { lat, lng } = selectedLocation;
    if (!lat || !lng) return [];
    return allLocations
      .filter(l => locKey(l) !== locKey(selectedLocation) && l.lat && l.lng)
      .map(l => ({ ...l, dist: haversine(lat, lng, l.lat, l.lng) }))
      .filter(l => l.dist <= radius)
      .sort((a, b) => a.dist - b.dist);
  }, [selectedLocation, allLocations, radius]);

  const nearbyFiltered = useMemo(() => {
    if (activeTab === "All") return nearbyAll;
    return nearbyAll.filter(l => l.locType === activeTab);
  }, [nearbyAll, activeTab]);

  const systemGroups = useMemo(() => {
    const groups = {};
    allLocations.forEach(l => {
      const sys = l.systemName || l.system || "Unknown";
      if (!groups[sys]) groups[sys] = [];
      groups[sys].push(l);
    });
    return groups;
  }, [allLocations]);

  const filteredLocations = useMemo(() => {
    let list = tabFiltered;
    if (searchText) {
      const q = searchText.toLowerCase();
      list = list.filter(l =>
        (l.name || "").toLowerCase().includes(q) ||
        (l.address || "").toLowerCase().includes(q) ||
        (l.area || "").toLowerCase().includes(q) ||
        (l.systemName || "").toLowerCase().includes(q)
      );
    }
    return list;
  }, [tabFiltered, searchText]);

  const stats = useMemo(() => {
    const list = selectedLocation ? nearbyFiltered : filteredLocations;
    return {
      total: list.length,
      slots: list.reduce((s, l) => s + (l.sameDaySlots || 0), 0),
      nextDaySlots: list.reduce((s, l) => s + (l.nextDaySlots || 0), 0),
      withAvail: list.filter(l => (l.sameDaySlots || 0) > 0).length,
      ucCount: list.filter(l => l.locType === "UC").length,
      pcpCount: list.filter(l => l.locType === "PCP").length,
    };
  }, [filteredLocations, nearbyFiltered, selectedLocation]);

  const timeStr = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
  const dateStr = now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });

  const tabs = [
    { key: "All", label: "All", count: allLocations.length },
    { key: "UC", label: "Urgent Care", count: allLocations.filter(l => l.locType === "UC").length },
    { key: "PCP", label: "Primary Care", count: allLocations.filter(l => l.locType === "PCP").length },
    { key: "Trends", label: "📈 Trends", count: trendsData ? (trendsData.snapshots || []).length : 0 },
    { key: "WaitTimes", label: "⚠️ Wait Times", count: waitAlerts ? (waitAlerts.entries || []).filter(e => e.scrapeDate === new Date().toISOString().slice(0,10)).length : 0 },
    { key: "sys_corewell_uc", label: "Corewell UC", count: allLocations.filter(l => l.system === "corewell_uc").length },
    { key: "sys_corewell_pc", label: "Corewell PC", count: allLocations.filter(l => l.system === "corewell_pc").length },
    { key: "sys_firstchoice_uc", label: "1st Choice UC", count: allLocations.filter(l => l.system === "firstchoice_uc").length },
    { key: "sys_doctors_care", label: "Doctors Care", count: allLocations.filter(l => l.system === "doctors_care").length },
    { key: "sys_gohealth_uc", label: "GoHealth UC", count: allLocations.filter(l => l.system === "gohealth_uc").length },
    { key: "sys_henryford_pc", label: "Henry Ford PC", count: allLocations.filter(l => l.system === "henryford_pc").length },
    { key: "sys_trinity_pc", label: "Trinity Health PC", count: allLocations.filter(l => l.system === "trinity_pc").length },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#F5F5F5" }}>
      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%)", padding: "20px 24px", color: "#fff" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ width: 7, height: 7, borderRadius: "50%", background: apiHealth && (apiHealth.status === "healthy" || apiHealth.status === "static" || apiHealth.status === "ok") ? "#A5D6A7" : "#FF9800", animation: "pulse 2s infinite" }} />
                <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.1em", color: "#A5D6A7", fontFamily: "'JetBrains Mono', monospace" }}>
                  {loading ? "CONNECTING..." : error ? "API OFFLINE" : `LIVE — ${allLocations.length} LOCATIONS`}
                </span>
              </div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif" }}>Same-Day Access Intelligence</h1>
              <p style={{ margin: "2px 0 0", fontSize: 12, color: "#C8E6C9" }}>
                {liveData ? `Last scan: ${liveData.lastUpdated || "unknown"} · ${radius}-mile radius analysis` : "Connecting to API..."}
              </p>
            </div>
            <div style={{ textAlign: "right", fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>
              <div style={{ color: "#C8E6C9" }}>{dateStr}</div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>{timeStr}</div>
              {lastFetch && <div style={{ fontSize: 9, color: "#A5D6A7", marginTop: 2 }}>Refreshed: {lastFetch.toLocaleTimeString()}</div>}
            </div>
          </div>

          {!loading && !error && allLocations.length > 0 && !activeTab.startsWith("sys_") && activeTab !== "Trends" && activeTab !== "WaitTimes" && (
            <div style={{ marginTop: 16, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>

                                  {historyEntries.map((e, i) => {
                                    const dd = new Date(e.scrapeDate + "T12:00:00");
                                    const weekday = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dd.getDay()];
                                    return (
                                      <tr key={"h"+i} style={{ borderBottom: "1px solid #F5F5F5" }}>
                                        <td style={{ padding: "4px 12px", fontSize: 11 }}>{weekday} {dd.getMonth()+1}/{dd.getDate()}</td>
                                        <td style={{ padding: "4px 12px", fontSize: 11, fontFamily: "'JetBrains Mono',monospace" }}>{e.scrapeTimeDisplay}</td>
                                        <td style={{ padding: "4px 12px", fontSize: 11, fontWeight: 600 }}>{e.locationName}</td>
                                        <td style={{ padding: "4px 12px", fontSize: 11, fontFamily: "'JetBrains Mono',monospace" }}>{e.nextAvailableTime}</td>
                                        <td style={{ padding: "4px 12px", textAlign: "right", fontSize: 11, fontFamily: "'JetBrains Mono',monospace" }}>{e.hoursOut}h</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </details>
                        </div>
                      )}
                      </div>
                    );
                  })()}
                </div>
              </div>
            )}
          </div>
        )}

        {/* SYSTEM SUMMARY VIEWS */}
        {!loading && !error && activeTab.startsWith("sys_") && sysLocs.length >= 0 && (() => {
          const currentMinutes = now.getHours() * 60 + now.getMinutes();
          
          // Parse earliest time from a location
          const getEarliestMinutes = (loc) => {
            const na = loc.nextAvailable || "";
            const timeMatch = na.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
            if (!timeMatch) return null;
            let h = parseInt(timeMatch[1]);
            const m = parseInt(timeMatch[2]);
            const ampm = timeMatch[3].toUpperCase();
            if (ampm === "PM" && h !== 12) h += 12;
            if (ampm === "AM" && h === 12) h = 0;
            return h * 60 + m;
          };
          
          // Parse patients in line from nextAvailable
          const getPatientsInLine = (loc) => {
            const na = loc.nextAvailable || "";
            const match = na.match(/(\d+)\s*in\s*line/i);
            return match ? parseInt(match[1]) : 0;
          };
          
          // KPIs
          const totalCenters = sysLocs.length;
          const centersWithSlots = sysLocs.filter(l => (l.sameDaySlots || 0) > 0).length;
          const totalSameDay = sysLocs.reduce((s, l) => s + (l.sameDaySlots || 0), 0);
          const totalNextDay = sysLocs.reduce((s, l) => s + (l.nextDaySlots || 0), 0);
          
          // Centers with wait > 50 min
          const longWaitCenters = sysLocs.filter(l => {
            if ((l.sameDaySlots || 0) === 0) return false;
            const earliest = getEarliestMinutes(l);
            if (earliest === null) return false;
            return (earliest - currentMinutes) >= 50;
          });
          
          // Centers with > 3 patients in line
          const busyCenters = sysLocs.filter(l => getPatientsInLine(l) > 3);
          
          // Centers with availability in next hour
          const nextHourCenters = sysLocs.filter(l => {
            if ((l.sameDaySlots || 0) === 0) return false;
            const earliest = getEarliestMinutes(l);
            if (earliest === null) return false;
            const diff = earliest - currentMinutes;
            return diff >= 0 && diff <= 60;
          });
          
          return (
            <div style={{ animation: "fadeIn .3s ease" }}>
              {/* KPI Cards */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 10, marginBottom: 16 }}>
                <div style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", border: "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Centers</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#212121", fontFamily: "'Space Grotesk',sans-serif" }}>{totalCenters}</div>
                </div>
                <div style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", border: "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Same-Day Slots</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1565C0", fontFamily: "'Space Grotesk',sans-serif" }}>{totalSameDay}</div>
                </div>
                <div style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", border: "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>W/ Availability</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#2E7D32", fontFamily: "'Space Grotesk',sans-serif" }}>{centersWithSlots}</div>
                </div>
                <div style={{ background: longWaitCenters.length > 0 ? "#FFF3E0" : "#fff", borderRadius: 10, padding: "10px 14px", border: longWaitCenters.length > 0 ? "1px solid #FFB74D" : "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Wait &gt;50 min</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: longWaitCenters.length > 0 ? "#E65100" : "#9E9E9E", fontFamily: "'Space Grotesk',sans-serif" }}>{longWaitCenters.length}</div>
                </div>
                <div style={{ background: busyCenters.length > 0 ? "#FFF3E0" : "#fff", borderRadius: 10, padding: "10px 14px", border: busyCenters.length > 0 ? "1px solid #FFB74D" : "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>&gt;3 In Line</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: busyCenters.length > 0 ? "#E65100" : "#9E9E9E", fontFamily: "'Space Grotesk',sans-serif" }}>{busyCenters.length}</div>
                </div>
                <div style={{ background: "#fff", borderRadius: 10, padding: "10px 14px", border: "1px solid #E0E0E0" }}>
                  <div style={{ fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Avail &lt;1hr</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#1B5E20", fontFamily: "'Space Grotesk',sans-serif" }}>{nextHourCenters.length}</div>
                </div>
              </div>
              
              {/* Location table */}
              <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E0E0E0", overflow: "hidden" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#FAFAFA", borderBottom: "1px solid #E0E0E0" }}>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Location</th>
                      <th style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Today</th>
                      <th style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Next</th>
                      <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono',monospace" }}>Next Available</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sysLocs.sort((a,b) => (b.sameDaySlots||0) - (a.sameDaySlots||0)).map((loc, i) => {
                      const earliest = getEarliestMinutes(loc);
                      const waitMin = earliest !== null ? earliest - currentMinutes : null;
                      const isLongWait = waitMin !== null && waitMin >= 50;
                      const pil = getPatientsInLine(loc);
                      return (
                        <tr key={loc.id || i} style={{ borderBottom: "1px solid #F5F5F5", background: isLongWait ? "#FFF8E1" : i % 2 === 0 ? "#fff" : "#FCFCFC", cursor: "pointer" }}
                            onClick={() => { setSelectedUC(locKey(loc)); setActiveTab("All"); }}>
                          <td style={{ padding: "8px 12px" }}>
                            <div style={{ fontWeight: 600, fontSize: 13, color: "#212121" }}>{loc.name}</div>
                            <div style={{ fontSize: 10, color: "#9E9E9E", marginTop: 1 }}>{loc.address}</div>
                          </td>
                          <td style={{ padding: "8px 12px", textAlign: "right" }}>
                            <span style={{ display: "inline-block", minWidth: 28, textAlign: "center", padding: "2px 8px", borderRadius: 10, fontSize: 12, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace",
                              background: (loc.sameDaySlots||0) > 0 ? "#E8F5E9" : "#FFEBEE",
                              color: (loc.sameDaySlots||0) > 0 ? "#2E7D32" : "#C62828" }}>
                              {loc.sameDaySlots || 0}
                            </span>
                          </td>
                          <td style={{ padding: "8px 12px", textAlign: "right" }}>
                            <span style={{ fontSize: 12, fontWeight: 600, fontFamily: "'JetBrains Mono',monospace", color: "#757575" }}>
                              {loc.nextDaySlots || "—"}
                            </span>
                          </td>
                          <td style={{ padding: "8px 12px", fontSize: 12, color: isLongWait ? "#E65100" : "#616161", fontWeight: isLongWait ? 700 : 400 }}>
                            {loc.nextAvailable || "—"}
                            {isLongWait && <span style={{ marginLeft: 6, fontSize: 10, color: "#E65100", fontWeight: 700 }}>⚠️ {Math.round(waitMin)}min wait</span>}
                            {pil > 3 && <span style={{ marginLeft: 6, fontSize: 10, color: "#E65100", fontWeight: 700 }}>🔴 {pil} in line</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })()}

                {/* OVERVIEW TABLE */}
        {!loading && !error && !selectedLocation && activeTab !== "Trends" && activeTab !== "WaitTimes" && !activeTab.startsWith("sys_") && (
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E0E0E0", overflow: "hidden", animation: "fadeIn .3s ease" }}>
            <div style={{ display: "grid", gridTemplateColumns: "38px 1fr 120px 50px 50px 140px 55px", padding: "8px 16px", background: "#FAFAFA", fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" }}>
              <div>Type</div><div>Location</div><div>System</div><div>Today</div><div style={{color:"#1565C0"}}>Next</div><div>Next Available</div><div>Source</div>
            </div>
            {filteredLocations.slice(0, 200).map((loc, i) => (
              <div key={locKey(loc) || i} className="row" onClick={() => setSelectedUC(locKey(loc))}
                style={{ display: "grid", gridTemplateColumns: "38px 1fr 120px 50px 50px 140px 55px", padding: "7px 16px", alignItems: "center", borderBottom: "1px solid #F5F5F5", background: i % 2 === 0 ? "#fff" : "#FCFCFC", cursor: "pointer" }}>
                <div><TypeBadge type={loc.locType} /></div>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 12, color: "#212121" }}>{loc.name}</div>
                  <div style={{ fontSize: 10, color: "#9E9E9E", marginTop: 1 }}>{loc.address || loc.area || ""}</div>
                </div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#2E7D32" }}>{loc.systemName || loc.system || ""}</div>
                <div>{loc.locType === "UC" ? <span style={{color:"#BDBDBD",fontSize:10}}>—</span> : <SlotBadge count={loc.sameDaySlots || 0} />}</div>
                <div><NextDayBadge count={loc.nextDaySlots || 0} dateStr={loc.nextAvailableDate || ""} /></div>
                <div style={{ fontSize: 10, fontWeight: 600, color: nextAvailColor(loc.nextAvailable || ""), lineHeight: 1.3 }}>{loc.nextAvailable || "—"}</div>
                <div style={{ fontSize: 9, color: "#BDBDBD", fontFamily: "'JetBrains Mono', monospace" }}>{loc.source || "—"}</div>
              </div>
            ))}
            {filteredLocations.length === 0 && <div style={{ padding: 32, textAlign: "center", color: "#9E9E9E" }}>No locations match.</div>}
            {filteredLocations.length > 200 && <div style={{ padding: 12, textAlign: "center", color: "#9E9E9E", fontSize: 12 }}>Showing first 200 of {filteredLocations.length}.</div>}
          </div>
        )}

        {/* RADIUS VIEW */}
        {!loading && !error && selectedLocation && activeTab !== "Trends" && activeTab !== "WaitTimes" && !activeTab.startsWith("sys_") && (
          <div style={{ animation: "fadeIn .3s ease" }}>
            {/* Selected location card */}
            <div style={{ background: "#E8F5E9", borderRadius: 12, border: "1px solid #A5D6A7", padding: "12px 16px", marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <TypeBadge type={selectedLocation.locType || getLocType(selectedLocation)} />
                    <span style={{ fontWeight: 700, fontSize: 15, color: "#1B5E20", fontFamily: "'Space Grotesk', sans-serif" }}>{selectedLocation.name}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#2E7D32", marginTop: 2 }}>{selectedLocation.address}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "flex-end" }}>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 8, fontWeight: 600, color: "#558B2F", textTransform: "uppercase", marginBottom: 2 }}>Today</div>
                      <SlotBadge count={selectedLocation.sameDaySlots || 0} />
                    </div>
                    {(selectedLocation.nextDaySlots || 0) > 0 && (
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 8, fontWeight: 600, color: "#1565C0", textTransform: "uppercase", marginBottom: 2 }}>Next</div>
                        <NextDayBadge count={selectedLocation.nextDaySlots || 0} />
                      </div>
                    )}
                  </div>
                  <div style={{ fontSize: 10, color: "#2E7D32", marginTop: 4 }}>{selectedLocation.nextAvailable || ""}</div>
                </div>
              </div>
            </div>

            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #E0E0E0", overflow: "hidden" }}>
              <div style={{ padding: "12px 16px 8px", borderBottom: "1px solid #F0F0F0" }}>
                <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif", color: "#212121" }}>
                  {nearbyFiltered.length} {activeTab === "All" ? "locations" : activeTab === "UC" ? "urgent care sites" : "primary care practices"} within {radius} miles
                </h3>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "42px 38px 1fr 120px 50px 50px 130px", padding: "6px 16px", background: "#FAFAFA", fontSize: 9, fontWeight: 600, color: "#9E9E9E", letterSpacing: ".05em", textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" }}>
                <div>Dist</div><div>Type</div><div>Location</div><div>System</div><div>Today</div><div style={{color:"#1565C0"}}>Next</div><div>Next Available</div>
              </div>

              {nearbyFiltered.length === 0 ? (
                <div style={{ padding: 32, textAlign: "center", color: "#9E9E9E", fontSize: 13 }}>
                  No {activeTab !== "All" ? activeTab + " " : ""}locations within {radius} miles.
                  {!selectedLocation.lat && " (No coordinates for this location — try another.)"}
                </div>
              ) : nearbyFiltered.map((loc, i) => (
                <div key={locKey(loc) || i} className="row" onClick={() => setSelectedUC(locKey(loc))}
                  style={{ display: "grid", gridTemplateColumns: "42px 38px 1fr 120px 50px 50px 130px", padding: "7px 16px", alignItems: "center", borderBottom: "1px solid #F5F5F5", background: i % 2 === 0 ? "#fff" : "#FCFCFC", cursor: "pointer" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: loc.dist < 3 ? "#2E7D32" : loc.dist < 6 ? "#F57F17" : "#757575", fontFamily: "'JetBrains Mono', monospace" }}>
                    {loc.dist.toFixed(1)}
                  </div>
                  <div><TypeBadge type={loc.locType} /></div>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 12, color: "#212121" }}>{loc.name}</div>
                    <div style={{ fontSize: 10, color: "#9E9E9E", marginTop: 1 }}>{loc.address || loc.area || ""}</div>
                  </div>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#2E7D32" }}>{loc.systemName || loc.system || ""}</div>
                  <div>{loc.locType === "UC" ? <span style={{color:"#BDBDBD",fontSize:10}}>—</span> : <SlotBadge count={loc.sameDaySlots || 0} />}</div>
                  <div><NextDayBadge count={loc.nextDaySlots || 0} dateStr={loc.nextAvailableDate || ""} /></div>
                  <div style={{ fontSize: 10, fontWeight: 600, color: nextAvailColor(loc.nextAvailable || ""), lineHeight: 1.3 }}>{loc.nextAvailable || "—"}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ marginTop: 20, textAlign: "center", fontSize: 10, color: "#BDBDBD", fontFamily: "'JetBrains Mono', monospace" }}>
          LIVE DATA · {radius}-MI RADIUS · AUTO-REFRESHES EVERY 5 MIN · {allLocations.length} LOCATIONS
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
